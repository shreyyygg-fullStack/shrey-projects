<div *ngIf="policyDetailsContainer">
   
      <div class=" setting-header-bar  d-flex justify-content-between align-items-center">
        <span style="padding-left: 8px;">Policy Details</span>
  
        <button type="button" class="btn btn-primary btn-sm btn-floating newPloicyBtn" (click)="newPolicy()">
          <i class="bi bi-plus-lg"></i> <span style="margin-left: 5px;">New Policy</span>
        </button>
      </div>
 
  
  
    <div class="policyDtlData">
  
      <div>
        <ul style="padding-left: 0;">
          <li class="row header policy-header">
            <div class="col-3 policy-header-txt">
              <label>Policy Type</label>
            </div>
            <div class="col-3 policy-header-txt">
              <label>Submit By</label>
            </div>
            <div class="col-3 policy-header-txt" >
              <label>Submission Date</label>
            </div>
            
          </li>
  
          <li class="row policy-column">
            <div class="col-3 policy-col-txt">
              <label class=" lbllistcss">Travel Expense.pdf</label>
            </div>
            <div class="col-3 policy-col-txt">
              <label class=" lbllistcss">Shivendra Singh</label>
            </div>
            <div class="col-3 policy-col-txt">
              <label class=" lbllistcss"> 2025-02-12</label>
            </div>
            
          </li>
        </ul>
      </div>
    </div>
  </div>
  
  
  <div *ngIf="newPolicyContainer">
    <div style=" width: 100%;">
      <div class=" setting-header-bar  d-flex justify-content-between align-items-center" style="margin-bottom: 3px;">
        <span style="padding-left: 8px;">New Policy</span>
        <i class="bi bi-x-square cancel cancelIconCss" 
          (click)="closeNewPolicyModal()"></i>
      </div>
  
      <ul class="nav nav-underline new-policy-nav">
        <li class="nav-item">
          <a class="nav-link new-policy-navlink" aria-current="page" [ngClass]="{'active': policyTab}" (click)="newPolicyTab()" >Policy </a>
        </li>
        <li class="nav-item">
          <a class="nav-link new-policy-navlink" [ngClass]="{'active': fuelTab}" (click)="fuelSettingTab()" >Fuel Setting</a>
        </li>
        <li class="nav-item">
          <a class="nav-link new-policy-navlink" [ngClass]="{'active': domesticTab}" (click)="domesticAllowTab()">Allowance</a>
        </li>
      </ul>
    </div>
  
  
    <div class="new-policy-data">
  
      <div *ngIf="policyTab" style="margin-left: 6px;">
        <div class="row mt-3 ">
          <div class="col-12 mb-3">
            <div class="row">
              <div class="col-4">
                <label for="companyName" class="form-label">Policy Name</label>
                <input type="text" class="form-control " class="form-control" placeholder="Enter policy name" />
              </div>
            </div>
          </div>
  
          <div class="col-4 mb-3">
            <label for="companyName" class="form-label">Upload Policy File</label>
            <div class="pdf-input-container">
              <label class="custom-file-upload">
                <i class="bi bi-plus-lg plus-icon"></i>
                <input type="file" (change)="onFileSelected($event)" accept="application/pdf" hidden />
                <span *ngIf="selectedFileName" title="{{ selectedFileName }}">{{ selectedFileName }}</span>
                <span *ngIf="!selectedFileName">Select File</span>
              </label>
            </div>
            
          </div>
        </div>
      </div>
  
      <div *ngIf="fuelTab" style="margin-left: 6px;">
        <div class="row mt-3 ">
          <div class="col-12 mb-3">
            <div class="row">
              <div class="col-4">
                <label for="companyName" class="form-label">Effective Date</label>
                <input type="date" class="form-control " class="form-control" />
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label">Vehicle Type</label>
                <select class="form-select form-control" [(ngModel)]="selectedVehicle1"
                  (change)="updateDisabledOptions()">
                  <option value="" selected>Select vehicle type</option>
                  <option value="2" [disabled]="selectedVehicle2 === '2'">2 Wheeler</option>
                  <option value="4" [disabled]="selectedVehicle2 === '4'">4 Wheeler</option>
                </select>
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label">Rate</label>
                <input type="number" class="form-control " class="form-control" />
              </div>
            </div>
  
            <div class="row mt-3">
              <div class="col-4">
                <label for="companyName" class="form-label">Effective Date</label>
                <input type="date" class="form-control " class="form-control" />
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label">Vehicle Type</label>
                <select class="form-select form-control" [(ngModel)]="selectedVehicle2"
                  (change)="updateDisabledOptions()">
                  <option value="" selected>Select vehicle type</option>
                  <option value="2" [disabled]="selectedVehicle1 === '2'">2 Wheeler</option>
                  <option value="4" [disabled]="selectedVehicle1 === '4'">4 Wheeler</option>
                </select>
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label">Rate</label>
                <input type="number" class="form-control " class="form-control" />
              </div>
            </div>
  
            <div class="row mt-3">
              <div class="col-4">
                <label for="companyName" class="form-label disable">Effective Date</label>
                <input type="date" class="form-control " class="form-control" readonly />
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Vehicle Type</label>
                <select class="form-select form-control" aria-label="Default select example" disabled>
                  <option selected disabled>Select vehicle type</option>
                  <option value="2">2 Wheeler</option>
                  <option value="4">4 Wheeler</option>
                </select>
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Rate</label>
                <input type="number" class="form-control " class="form-control" readonly />
              </div>
            </div>
  
            <div class="row mt-3">
              <div class="col-4">
                <label for="companyName" class="form-label disable">Effective Date</label>
                <input type="date" class="form-control " class="form-control" readonly />
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Vehicle Type</label>
                <select class="form-select form-control" aria-label="Default select example" disabled>
                  <option selected disabled>Select vehicle type</option>
                  <option value="2">2 Wheeler</option>
                  <option value="4">4 Wheeler</option>
                </select>
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Rate</label>
                <input type="number" class="form-control " class="form-control" readonly />
              </div>
            </div>
  
            <div class="row mt-3">
              <div class="col-4">
                <label for="companyName" class="form-label disable">Effective Date</label>
                <input type="date" class="form-control " class="form-control" readonly />
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Vehicle Type</label>
                <select class="form-select form-control" aria-label="Default select example" disabled>
                  <option selected disabled>Select vehicle type</option>
                  <option value="2">2 Wheeler</option>
                  <option value="4">4 Wheeler</option>
                </select>
              </div>
  
              <div class="col-4">
                <label for="companyName" class="form-label disable">Rate</label>
                <input type="number" class="form-control " class="form-control" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
  
      <div *ngIf="domesticTab" style="margin-left: 0px;padding: 0px;">
  
        <div style="overflow-y: auto; ">
          <table class="table table-bordered">
            <thead class="allowance-header">
              <tr>
                <th colspan="6" class="text-center">Domestic Travel Policy</th>
                <th colspan="3" class="text-center">Overseas Travel Policy</th>
              </tr>
              <tr>
                <th rowspan="2">Employee <br> Grade</th>
                <th colspan="3">Lodging/Hotel Stay (Excluding Taxes)</th>
                <th rowspan="2">Food <br>Allowance</th>
                <th rowspan="2">Daily Allowance<br>(8 Hrs.)</th>
  
                <th rowspan="2">Food <br>Allowance (USD)</th>
                <th rowspan="2">Daily Allowance<br> (INR)</th>
                <th rowspan="2">Actions</th>
              </tr>
              <tr>
                <th>Class A+</th>
                <th>Class A</th>
                <th>Class B</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of allowance; let i = index">
                <td>
                  <select class="form-select form-control" [(ngModel)]="row.selectedGrade"
                    (change)="updateSelectedGrades()">
                    <option value="" selected>Select grade</option>
                    <option *ngFor="let grade of gradesNames" [value]="grade" [disabled]="isGradeDisabled(grade)">
                      {{grade}}</option>
                  </select>
                </td>
                <td><input type="number" class="form-control" [(ngModel)]="row.classAPlus"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.classA"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.classB"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.domesticFa"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.domesticDa"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.overseasFa"></td>
                <td><input type="number" class="form-control" [(ngModel)]="row.overseasDa"></td>
                <td class="text-center">
                  <i class="bi bi-trash3" (click)="removeRow(i)" style="cursor: pointer;"></i>
                </td>
              </tr>
              <tr>
                <td colspan="9" style="text-align: start;"> <i class="bi bi-plus-lg" (click)="addRow()"
                    style="cursor: pointer;">Add Row</i> </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="form-footer ">
        <button class="btn btn-sm saveContinueBtn" 
          (click)="saveAndContinue()">Save & Continue</button>
      </div>
  
    </div>
  
  </div>
